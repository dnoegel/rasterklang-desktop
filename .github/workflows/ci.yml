name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libasound2-dev
      - name: Check out webplayer source
        run: git clone --depth=1 https://github.com/dnoegel/rasterklang-webplayer "$RUNNER_TEMP/rasterklang-webplayer"
      - run: make check
        env:
          WEBPLAYER_DIR: ${{ runner.temp }}/rasterklang-webplayer
